name: Sync Upstream Snapshot

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-snapshot
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Fetch latest upstream tree
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/mattpocock/skills.git
          git fetch --depth=1 upstream main
          upstream_sha="$(git rev-parse FETCH_HEAD)"
          current_sha="$(node -e "console.log(require('./.github/upstream-sync/upstream-lock.json').commit)")"
          echo "sha=$upstream_sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=${upstream_sha:0:12}" >> "$GITHUB_OUTPUT"
          if [[ "$upstream_sha" == "$current_sha" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          mkdir -p "$RUNNER_TEMP/upstream-snapshot"
          git archive --format=tar FETCH_HEAD -o "$RUNNER_TEMP/upstream.tar"
          tar -xf "$RUNNER_TEMP/upstream.tar" -C "$RUNNER_TEMP/upstream-snapshot"

      - name: Apply snapshot while preserving fork-owned paths
        if: steps.upstream.outputs.changed == 'true'
        run: >-
          node .github/upstream-sync/apply-upstream-snapshot.mjs
          --repo-root .
          --snapshot-root "$RUNNER_TEMP/upstream-snapshot"
          --sha "${{ steps.upstream.outputs.sha }}"

      - name: Test and validate composed repository
        if: steps.upstream.outputs.changed == 'true'
        run: |
          node --test .github/upstream-sync/tests/*.test.mjs
          node .github/upstream-sync/validate.mjs

      - name: Commit snapshot and classify change
        if: steps.upstream.outputs.changed == 'true'
        id: classify
        shell: bash
        run: |
          set -euo pipefail
          base_sha="$(git rev-parse HEAD)"
          branch="sync/upstream-${{ steps.upstream.outputs.short_sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add -A
          git restore --staged .github/upstream-sync/upstream-lock.json
          content_commit=false
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync upstream snapshot ${{ steps.upstream.outputs.short_sha }}"
            content_commit=true
          fi
          node .github/upstream-sync/classify-sync.mjs \
            --repo-root . \
            --before "$base_sha" \
            --after HEAD \
            --github-output "$GITHUB_OUTPUT"
          git add .github/upstream-sync/upstream-lock.json
          if [[ "$content_commit" == "true" ]]; then
            git commit --amend --no-edit
          else
            git commit -m "chore: sync upstream snapshot ${{ steps.upstream.outputs.short_sha }}"
          fi
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Push synchronization branch
        if: steps.upstream.outputs.changed == 'true' && steps.classify.outputs.blocked == 'false'
        run: git push --force-with-lease origin "HEAD:${{ steps.classify.outputs.branch }}"

      - name: Create or update pull request
        if: steps.upstream.outputs.changed == 'true' && steps.classify.outputs.blocked == 'false'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PR_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::Required repository secret SYNC_PR_TOKEN is not configured."
            exit 1
          fi
          branch="${{ steps.classify.outputs.branch }}"
          head="${{ github.repository_owner }}:$branch"
          url="$(gh api --method GET \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "repos/${{ github.repository }}/pulls" \
            -f state=open \
            -f head="$head" \
            --jq '.[0].html_url // empty')"
          if [[ -z "$url" ]]; then
            url="$(gh api --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "repos/${{ github.repository }}/pulls" \
              -f title="chore: sync upstream ${{ steps.upstream.outputs.short_sha }}" \
              -f head="$branch" \
              -f base=main \
              -f body="Automated upstream snapshot. Structural change: ${{ steps.classify.outputs.structural }}. Upstream commit: ${{ steps.upstream.outputs.sha }}. Human review is required." \
              --jq .html_url)"
            echo "Created pull request: $url"
          else
            echo "Pull request already exists: $url"
          fi
