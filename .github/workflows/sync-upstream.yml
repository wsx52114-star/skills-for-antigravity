name: Sync Upstream Skills

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 00:00 (台灣時間上午 8 點) 自動執行
  workflow_dispatch: # 允許手動觸發

jobs:
  sync-skills:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Configure Git and Run Sync Script
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 執行我們的自動化同步與轉譯腳本
          python scripts/sync_upstream.py

      - name: Push Changes
        run: |
          # 檢查是否有任何變更（不論是 commit 還是 unstaged）
          # 因為 sync_upstream.py 會進行 git merge，如果有更新，HEAD 會往前移動
          # 我們可以使用 git status 或者 git diff 來檢查是否需要 push
          # 更穩健的做法是直接嘗試 push
          git push origin main || echo "No changes to push or push failed"

