name: Sync i-have-adhd

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-i-have-adhd
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Fetch and validate latest i-have-adhd snapshot
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          git remote add i-have-adhd-upstream https://github.com/ayghri/i-have-adhd.git
          git fetch --depth=1 i-have-adhd-upstream main
          upstream_sha="$(git rev-parse FETCH_HEAD)"
          current_sha="$(node -e "console.log(require('./.github/i-have-adhd-sync/upstream-lock.json').commit)")"
          echo "sha=$upstream_sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=${upstream_sha:0:12}" >> "$GITHUB_OUTPUT"
          if [[ "$upstream_sha" == "$current_sha" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          branch="sync/i-have-adhd-${upstream_sha:0:12}"
          remote_branch="$(git ls-remote --heads origin "refs/heads/$branch")"
          if [[ -n "$remote_branch" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "i-have-adhd commit $upstream_sha already has synchronization branch $branch."
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          invalid_entries="$(git ls-tree -r FETCH_HEAD -- LICENSE skills/i-have-adhd | awk '$1 !~ /^100(644|755)$/ || $2 != "blob"')"
          if [[ -n "$invalid_entries" ]]; then
            echo "i-have-adhd snapshot contains unsupported Git entries:" >&2
            echo "$invalid_entries" >&2
            exit 1
          fi
          git cat-file -e FETCH_HEAD:LICENSE
          git cat-file -e FETCH_HEAD:skills/i-have-adhd/SKILL.md

          mkdir -p "$RUNNER_TEMP/i-have-adhd-snapshot"
          git archive --format=tar FETCH_HEAD LICENSE skills/i-have-adhd \
            -o "$RUNNER_TEMP/i-have-adhd.tar"
          tar -xf "$RUNNER_TEMP/i-have-adhd.tar" \
            -C "$RUNNER_TEMP/i-have-adhd-snapshot"

      - name: Apply i-have-adhd snapshot
        if: steps.upstream.outputs.changed == 'true'
        run: >-
          node .github/i-have-adhd-sync/apply-upstream-snapshot.mjs
          --repo-root .
          --snapshot-root "$RUNNER_TEMP/i-have-adhd-snapshot"
          --sha "${{ steps.upstream.outputs.sha }}"

      - name: Test and validate composed repository
        if: steps.upstream.outputs.changed == 'true'
        run: |
          node --test .github/upstream-sync/tests/*.test.mjs
          node .github/upstream-sync/validate.mjs

      - name: Commit snapshot
        if: steps.upstream.outputs.changed == 'true'
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          branch="sync/i-have-adhd-${{ steps.upstream.outputs.short_sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add -A
          git commit -m "chore: sync i-have-adhd ${{ steps.upstream.outputs.short_sha }}"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Push synchronization branch
        if: steps.upstream.outputs.changed == 'true'
        run: git push --force-with-lease origin "HEAD:${{ steps.commit.outputs.branch }}"

      - name: Create pull request
        if: steps.upstream.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PR_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::Required repository secret SYNC_PR_TOKEN is not configured."
            exit 1
          fi
          branch="${{ steps.commit.outputs.branch }}"
          url="$(gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "repos/${{ github.repository }}/pulls" \
            -f title="chore: sync i-have-adhd ${{ steps.upstream.outputs.short_sha }}" \
            -f head="$branch" \
            -f base=main \
            -f body="Automated snapshot from ayghri/i-have-adhd at commit ${{ steps.upstream.outputs.sha }}. The local adapter preserves explicit-only invocation. This update requires human review and will not be auto-merged." \
            --jq .html_url)"
          echo "Created pull request: $url"
